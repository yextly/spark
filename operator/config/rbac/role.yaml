---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - compute.yextly.io
  resources:
  - workertemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - compute.yextly.io
  resources:
  - workertemplates/finalizers
  verbs:
  - update
- apiGroups:
  - compute.yextly.io
  resources:
  - workertemplates/status
  verbs:
  - get
  - patch
  - update
