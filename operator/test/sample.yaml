apiVersion: v1
kind: Namespace
metadata:
  name: test-namespace
---
apiVersion: compute.yextly.io/v1alpha1
kind: WorkerTemplate
metadata:
  name: worker1
  namespace: test-namespace
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: hello-world
              image: busybox
              command: ['echo', 'Hello, World!']
---
apiVersion: compute.yextly.io/v1alpha1
kind: WorkerInstance
metadata:
  namespace: test-namespace
  name: req1
spec:
  templateName: worker1
  workerId: aa-bb-cc
