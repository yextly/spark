name: Create Codegen PR

on:
  push:
    branches:
      - "codegen/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create_pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PR_TITLE="Update generated artifacts"
          PR_BODY="Updates automatically generated artifacts"

          BASE='main'

          # Create PR (fallback to edit if it already exists)
          gh pr create \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}" \
            --label codegen \
            --base "${BASE}" \
            || gh pr edit "$BRANCH" \
                 --title "${PR_TITLE}" \
                 --add-label codegen \
                 --body "${PR_BODY}"