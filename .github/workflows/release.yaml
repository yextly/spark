name: Release Operator

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Install yq
      # -------------------------------
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # -------------------------------
      # Checkout repository
      # -------------------------------
      - name: Checkout
        uses: actions/checkout@v6

      # -------------------------------
      # Get the operator version from our file and then from the csv
      # -------------------------------
      - name: Read operator version
        id: operator-version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read version from operator CSV
        id: csv-version
        run: |
          CSV_FILE="operator/bundle/manifests/operator.clusterserviceversion.yaml"

          CSV_VERSION=$(yq '.spec.version' "$CSV_FILE")

          echo "csv_version=$CSV_VERSION" >> $GITHUB_OUTPUT

      # -------------------------------
      # Ensure we are not making any mistake
      # -------------------------------
      - name: Ensure version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          FILE_VERSION="${{ steps.operator-version.outputs.version }}"

          echo "Tag version: $TAG"
          echo "File version: $FILE_VERSION"

          if [ "$TAG" != "$FILE_VERSION" ]; then
            echo "❌ Version mismatch! Tag ($TAG) does NOT match version.txt ($FILE_VERSION)"
            exit 1
          fi

          echo "✅ Versions match"


      - name: Ensure CSV version matches the tag
        run: |
          echo "CSV version: ${{ steps.csv-version.outputs.csv_version }}"
          echo "Expected version: ${{ steps.operator-version.outputs.version }}"

          if [ "${{ steps.csv-version.outputs.csv_version }}" != "${{ steps.operator-version.outputs.version }}" ]; then
            echo "❌ Versions DO NOT match!"
            exit 1
          fi

          echo "✅ Versions match"

      # -------------------------------
      # Extract Go version from go.mod
      # -------------------------------
      - name: Read Go version
        id: go
        run: |
          GOVERSION=$(grep '^go [0-9]' go.mod | awk '{print $2}')
          echo "version=$GOVERSION" >> $GITHUB_OUTPUT

      # -------------------------------
      # Set up Go from extracted version
      # -------------------------------
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go.outputs.version }}

      # -------------------------------
      # Extract Operator SDK version from env/build/Dockerfile
      # (ARG OPERATOR_SDK_VERSION=x.y.z)
      # -------------------------------
      - name: Read Operator SDK version
        id: sdk
        run: |
          SDK=$(grep '^ARG OPERATOR_SDK_VERSION=' env/build/Dockerfile | sed 's/ARG OPERATOR_SDK_VERSION=//')
          echo "version=$SDK" >> $GITHUB_OUTPUT

      # -------------------------------
      # Install Operator SDK binary
      # -------------------------------
      - name: Install Operator SDK
        run: |
          curl -sSL \
            https://github.com/operator-framework/operator-sdk/releases/download/${{ steps.sdk.outputs.version }}/operator-sdk_linux_amd64 \
            -o operator-sdk
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/

      # -------------------------------
      # Prepare environment
      # -------------------------------
      - name: Initialize environment
        run: |
          ./scripts/initialize-environment.sh "${GITHUB_REF_NAME}"

      # # -------------------------------
      # # Validate the pre-versioned bundle
      # # -------------------------------
      # - name: Validate bundle metadata
      #   working-directory: operator
      #   env:
      #     OPERATOR_SDK_DISABLE_PULL: "true"
      #   run: |
      #     operator-sdk bundle validate ./bundle --type bundle --select-optional suite=operatorframework

      # -------------------------------
      # Docker login
      # -------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------
      # Build bundle image
      # -------------------------------
      - name: Build Operator Bundle Image
        working-directory: operator
        run: |
          make bundle-build

      # -------------------------------
      # Build Operator Runtime Image
      # -------------------------------
      - name: Build Operator Runtime Image
        working-directory: operator
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spark-operator:${{ steps.operator-version.outputs.version }} .

      # -------------------------------
      # Push Operator Runtime Image
      # -------------------------------
      - name: Push Operator Runtime Image
        working-directory: operator
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spark-operator:${{ steps.operator-version.outputs.version }}

      # -------------------------------
      # Generate SBOM using Syft
      # -------------------------------
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft ${{ secrets.DOCKERHUB_USERNAME }}/spark-operator:${{ steps.operator-version.outputs.version }} -o json > /tmp/sbom.json

      # -------------------------------
      # Push bundle image
      # -------------------------------
      - name: Push Operator Bundle Image
        working-directory: operator
        run: |
          make bundle-push

      # -------------------------------
      # Create catalog image
      # -------------------------------
      - name: Build Operator Catalog Image
        working-directory: operator
        run: |
          make build-catalog

      # -------------------------------
      # Push catalog image
      # -------------------------------
      - name: Push Operator Catalog Image
        working-directory: operator
        run: |
          make catalog-push

      # -------------------------------
      # Create ZIP of bundle directory
      # -------------------------------
      - name: Archive bundle directory
        run: |
          zip -r /tmp/spark-operator.zip operator/bundle

      # # -------------------------------
      # # Generate changelog since previous tag
      # # -------------------------------
      # - name: Generate changelog
      #   id: changelog
      #   run: |
      #     PREV_TAG=$(git describe --tags --abbrev=0 "$(git rev-list --tags --skip=1 --max-count=1)" 2>/dev/null || echo "")

      #     if [ -z "$PREV_TAG" ]; then
      #       echo "No previous tag found, using initial commit."
      #       git log --pretty=format:"- %s" > CHANGELOG.md
      #     else
      #       echo "Previous tag: $PREV_TAG"
      #       git log $PREV_TAG..HEAD --pretty=format:"- %s" > CHANGELOG.md
      #     fi

      #     echo "changelog<<EOF" >> $GITHUB_OUTPUT
      #     cat CHANGELOG.md >> $GITHUB_OUTPUT
      #     echo "EOF" >> $GITHUB_OUTPUT

      # -------------------------------
      # Create GitHub Release
      # -------------------------------
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ github.ref_name }}"
          body: |
            ## Changelog
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Upload manifests
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/spark-operator.zip
          asset_name: spark-operator.zip
          asset_content_type: application/zip

      - name: Upload SBOM
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/sbom.json
          asset_name: sbom.json
          asset_content_type: application/json
