name: Regenerate artifacts

env:
  BRANCH: "codegen/codegen-artifacts"

on:
  push:
    branches: [ "main" ]


permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout repository
      # -------------------------------
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # -------------------------------
      # Get the operator version from file. Not from the tag
      # -------------------------------
      - name: Read operator version
        id: operator-version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -------------------------------
      # Use Go version from go.mod
      # -------------------------------
      - name: Read Go version
        id: go
        run: |
          GOVERSION=$(grep '^go [0-9]' go.mod | awk '{print $2}')
          echo "version=$GOVERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go.outputs.version }}

      # -------------------------------
      # Extract Operator SDK version from env/build/Dockerfile
      # (ARG OPERATOR_SDK_VERSION=x.y.z)
      # -------------------------------
      - name: Read Operator SDK version
        id: sdk
        run: |
          SDK=$(grep '^ARG OPERATOR_SDK_VERSION=' env/build/Dockerfile | sed 's/ARG OPERATOR_SDK_VERSION=//')
          echo "version=$SDK" >> $GITHUB_OUTPUT

      # -------------------------------
      # Install Operator SDK binary
      # -------------------------------
      - name: Install Operator SDK
        run: |
          curl -sSL \
            https://github.com/operator-framework/operator-sdk/releases/download/${{ steps.sdk.outputs.version }}/operator-sdk_linux_amd64 \
            -o operator-sdk
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/
          
      # -------------------------------
      # Update mods
      # -------------------------------
      - name: Update mods
        working-directory: operator
        run: |
          go mod tidy
          go mod vendor
      
      # -------------------------------
      # Prepare environment
      # -------------------------------
      - name: Initialize environment
        run: |
          ./scripts/initialize-environment.sh "${{ steps.operator-version.outputs.version }}"

      # -------------------------------
      # Regenerate manifests + bundle
      # -------------------------------
      - name: Generate & bundle
        working-directory: operator
        run: |
          make generate
          make manifests
          make bundle

      # -------------------------------
      # Patch manifests
      # -------------------------------
      - name: Patch manifests
        run: |
          ./scripts/patch-csv.sh

      # -------------------------------
      # Detect changes
      # -------------------------------
      - name: Detect changes
        id: meaningful
        run: |
          CSV="operator/bundle/manifests/operator.clusterserviceversion.yaml"

          git add .

          STAGED=$(git diff --cached --name-only)

          echo "Staged files:"
          echo "$STAGED"

          # If no staged files -> nothing to do
          if [ -z "$STAGED" ]; then
            echo "no" > meaningful_change
            exit 0
          fi

          # If more than one file changed -> meaningful
          COUNT=$(echo "$STAGED" | wc -l)
          if [ "$COUNT" -ne 1 ]; then
            echo "yes" > meaningful_change
            exit 0
          fi

          # If the only staged file is not the CSV -> meaningful
          if [ "$STAGED" != "$CSV" ]; then
            echo "yes" > meaningful_change
            exit 0
          fi

          # At this point: exactly one file changed AND it is the CSV.
          # Check whether the only changed line contains 'createdAt:'
          DIFF_LINES=$(git diff --cached -U0 "$CSV" | grep '^[-+]' | grep -v '^---' | grep -v '^+++')
          
          echo "Diff lines:"
          echo "$DIFF_LINES"

          # Extract only the actual changed lines (ignoring file headers)
          # If ANY changed line does NOT contain createdAt -> meaningful
          NON_CREATED_AT=$(echo "$DIFF_LINES" | grep -v 'createdAt:' || true)

          if [ -n "$NON_CREATED_AT" ]; then
            echo "yes" > meaningful_change
          else
            echo "no" > meaningful_change
          fi

      # -------------------------------
      # Push changes (if any)
      # -------------------------------
      - name: Push changes
        id: push
        if: steps.meaningful.outputs.change != 'no'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "272589547+yextly-ci-codegen-bot[bot]@users.noreply.github.com"
          git config --local user.name "Codegen Robot"

          LONG_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # Create/update branch
          git checkout -B "$BRANCH"
          git commit -m "Generate artifacts for (${LONG_SHA})"
          git push --force-with-lease origin "$BRANCH"

      - name: Generate GitHub App token
        if: steps.meaningful.outputs.change != 'no'
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.CODEGEN_APP_ID }}
          private-key: ${{ secrets.CODEGEN_PRIVATE_KEY }}

      - name: Create or update PR
        if: steps.meaningful.outputs.change != 'no'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_TITLE="Update generated artifacts"
          PR_BODY="Updates automatically generated artifacts"

          BASE='main'

          # Create PR (fallback to edit if it already exists)
          gh pr create \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}" \
            --label codegen \
            --base "${BASE}" \
            || gh pr edit "$BRANCH" \
                 --title "${PR_TITLE}" \
                 --add-label codegen \
                 --body "${PR_BODY}"
